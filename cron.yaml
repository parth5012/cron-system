jobs:
  - name: warmup
    schedule: "*/10 * * * *"
    secret: "${CRON_SECRET}"
    timeout_sec: 30
    description: "Keep Render awake"

  - name: backup
    schedule: "0 3 * * *"
    secret: "${CRON_SECRET}"
    timeout_sec: 120
    description: "Nightly DB backup to external storage"

  - name: linkedin-post
    schedule: "0 9 * * 1-5"
    secret: "${CRON_SECRET}"
    timeout_sec: 60
    description: "Post daily update"